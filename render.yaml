services:
  - type: web
    name: rcv-app
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: CF_TURNSTILE_SITE_KEY
        sync: false
      - key: CF_TURNSTILE_SECRET_KEY
        sync: false
